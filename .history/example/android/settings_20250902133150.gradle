pluginManagement {
    def flutterSdkPath = {
        def p = new Properties()
        file("local.properties").withInputStream { p.load(it) }
        def path = p.getProperty("flutter.sdk")
        assert path != null : "flutter.sdk not set in local.properties"
        return path
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

dependencyResolutionManagement {
    // خلّي Settings هي اللي تتحكم
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        // ⚠️ ضروري جدًا لحِزم Flutter (io.flutter:*)
        maven { url "https://storage.googleapis.com/download.flutter.io" }
        // مستودع APS مع فلترة على جروب com.amazon فقط
        maven {
            url "https://android-sdk.payfort.com"
            content { includeGroup("com.amazon") }
        }
    }
}

include(":app")
