
pluginManagement {
    def flutterSdkPath = {
        def p = new Properties()
        file("local.properties").withInputStream { p.load(it) }
        def path = p.getProperty("flutter.sdk")
        assert path != null : "flutter.sdk not set in local.properties"
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
  id "dev.flutter.flutter-plugin-loader" version "1.0.0"
  id "com.android.application" version "8.3.2" apply false
  id "org.jetbrains.kotlin.android" version "1.9.22" apply false
  id "org.gradle.toolchains.foojay-resolver-convention" version "0.8.0"
}

dependencyResolutionManagement {
    // ممكن تسيبها FAIL_ON_PROJECT_REPOS أو تستخدم PREFER_SETTINGS؛ المهم تضيف الـ repo هنا
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        // مستودع APS الرسمي
        maven { url "https://android-sdk.payfort.com" }
        // (اختياري) jitpack لو أي باكدچ تاني بتحتاجه
        // maven { url "https://jitpack.io" }
    }
}

include(":app")
